<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gvarii Republic Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { border: none; width: 100%; height: 100%; }
        #login-btn { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; background: #1a73e8; color: white; border-radius: 8px;
            text-decoration: none; font-family: sans-serif; font-weight: bold;
        }
    </style>
</head>
<body>

    <iframe id="gvarii-frame" src="https://gvariiapp.base44.app/"></iframe>

    <a id="login-btn" style="display:none;" 
       href="https://gvariiapp.base44.app/login?from_url=https://gvarii-app.firebaseapp.com" 
       target="_top">
       Click here to Sign In to Gvarii
    </a>

    <script>
        const frame = document.getElementById('gvarii-frame');
        const btn = document.getElementById('login-btn');

        // This checks if the iframe is stuck on the login page
        setInterval(() => {
            try {
                // If the iframe redirects to Base44's login, it will block this script
                // That's our cue to show the "Teleport" button!
                const check = frame.contentWindow.location.href;
            } catch (e) {
                btn.style.display = 'block';
                frame.style.display = 'none';
            }
        }, 1000);
    </script>
</body>
</html>
