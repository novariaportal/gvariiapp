<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gvarii Citizens</title>

    <link rel="icon" type="image/jpeg" href="Gvarii_Flag.jpg">
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#3498db">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        /* FIX: Using fixed position prevents the 'double scroll' or bounce on iOS */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            position: fixed; 
        }

        #app-wrapper { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0; 
            display: flex; 
            overflow: hidden;
        }

        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            flex-grow: 1; 
            -webkit-overflow-scrolling: touch; 
        }

        * { 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <iframe 
            id="main-app"
            src="https://gvariiapp.base44.app/" 
            referrerpolicy="no-referrer"
            allow="clipboard-write; camera; microphone; geolocation; fullscreen"
            title="Gvarii Citizens">
        </iframe>
    </div>

    <script>
        const iframe = document.getElementById('main-app');

        // 1. SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('pwabuilder-sw.js')
                    .then(reg => console.log('Service Worker Registered!', reg))
                    .catch(err => console.log('Service Worker Failed:', err));
            });
        }

        // 2. LOGIN LISTENER
        window.addEventListener('message', (event) => {
            if (event.origin === "https://gvariiapp.base44.app") {
                if (event.data === 'login-success') {
                    console.log("Login detected via PostMessage.");
                    iframe.contentWindow.location.reload();
                }
            }
        });

        // 3. FALLBACK REFRESH ON FOCUS
        window.addEventListener('focus', () => {
            console.log("App focused. Syncing session...");
            try {
                iframe.contentWindow.location.reload();
            } catch (e) {
                console.log("Cross-origin reload blocked.");
            }
        });

        // 4. IFRAME BUSTER FOR LOGIN
        // This ensures Google/Apple/Microsoft login screens break out of the iframe
        iframe.addEventListener('load', () => {
            try {
                const currentPath = iframe.contentWindow.location.href;
                
                if (currentPath.includes('accounts.google.com') || 
                    currentPath.includes('appleid.apple.com') || 
                    currentPath.includes('account.live.com')) {
                    
                    console.log("Login provider detected. Breaking out...");
                    window.location.href = currentPath;
                }
            } catch (e) {
                // If we hit a cross-origin error, it usually means the login 
                // page has already loaded but is being blocked.
                // This catch block helps handle those invisible security blocks.
                console.log("Iframe redirected to a protected domain.");
            }
        });
    </script>
</body>
</html>
