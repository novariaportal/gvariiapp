<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gvarii Citizens</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #003366; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
        
        /* The button from your image */
        #login-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: none; text-align: center; width: 90%;
        }
        .btn {
            background: #4285f4; color: white; padding: 18px 30px; border-radius: 50px;
            text-decoration: none; font-family: sans-serif; font-weight: bold;
            border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: inline-block;
        }
    </style>
</head>
<body>

    <iframe id="app-frame" src="https://gvariiapp.base44.app/"></iframe>

    <div id="login-container">
        <a href="https://gvariiapp.base44.app/login?from_url=https://gvarii-app.firebaseapp.com" 
           target="_top" class="btn">
           ⚠️ Click to Sign In (Google/Apple/MS)
        </a>
    </div>

    <script>
        const frame = document.getElementById('app-frame');
        const loginContainer = document.getElementById('login-container');

        // Monitor the iframe
        const checkSession = setInterval(() => {
            try {
                // If we can see the URL, it means we are NOT blocked (already logged in)
                const currentUrl = frame.contentWindow.location.href;
                loginContainer.style.display = 'none';
            } catch (e) {
                // If blocked, the iframe is trying to show the login page
                // We show the button so the user can 'Break Out' and sign in properly
                loginContainer.style.display = 'block';
            }
        }, 2000);

        // Success Handler: If the URL contains 'session', hide the button immediately
        if (window.location.href.includes('session') || window.location.href.includes('token')) {
            loginContainer.style.display = 'none';
            // Clean the URL bar to keep it looking professional
            window.history.replaceState({}, document.title, "/");
        }
    </script>
</body>
</html>
