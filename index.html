<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gvarii Citizens Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: -apple-system, sans-serif; }
        #app-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; }
        iframe { border: none; width: 100%; height: 100%; flex-grow: 1; }
        
        /* The "Repair" Button Styling */
        #repair-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; z-index: 10000;
        }
        .repair-btn {
            background: #4285F4; color: white; padding: 16px 28px; border-radius: 50px;
            text-decoration: none; font-weight: bold; font-size: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); border: 2px solid white;
            cursor: pointer; display: inline-block;
        }
    </style>
</head>
<body>

    <div id="repair-container">
        <a href="https://gvariiapp.base44.app/login?from_url=https%3A%2F%2Fgvariiapp.firebaseapp.com%2F" 
           target="_top" class="repair-btn">
           ⚠️ Click to Sign In (Google/Apple/MS)
        </a>
    </div>

    <div id="app-wrapper">
        <iframe id="main-app" src="https://gvariiapp.base44.app/"></iframe>
    </div>

    <script>
        const iframe = document.getElementById('main-app');
        const repairContainer = document.getElementById('repair-container');

        // This "Watcher" detects if the login page is being blocked
        setInterval(() => {
            try {
                // If we can read the URL, the user is still on your site (Email login)
                const currentPath = iframe.contentWindow.location.pathname;
                
                // If they are on the login page specifically, we show the button just in case
                if (currentPath.includes('login')) {
                    repairContainer.style.display = 'block';
                } else {
                    repairContainer.style.display = 'none';
                }
            } catch (e) {
                // If we hit an error, it's because the iframe tried to load Google/Apple/MS
                // and the browser blocked it. Show the button!
                repairContainer.style.display = 'block';
            }
        }, 2000);
    </script>
</body>
</html>
